apply plugin: "com.android.library"

def isNewArchitectureEnabled() {
    // To opt-in for the New Architecture, you can either:
    // - Set `newArchEnabled` to true inside the `gradle.properties` file
    // - Invoke gradle with `-newArchEnabled=true`
    // - Set an environment variable `ORG_GRADLE_PROJECT_newArchEnabled=true`
    return project.hasProperty("newArchEnabled") && project.newArchEnabled == "true"
}

def IS_NEW_ARCHITECTURE_ENABLED = isNewArchitectureEnabled()

if (IS_NEW_ARCHITECTURE_ENABLED) {
    apply plugin: "com.facebook.react"
}

// Defaults aligned with React Native 0.85.x requirements.
def DEFAULT_COMPILE_SDK_VERSION = 35
def DEFAULT_BUILD_TOOLS_VERSION = "35.0.0"
def DEFAULT_TARGET_SDK_VERSION = 35
def DEFAULT_MIN_SDK_VERSION = 24

android {
    namespace "com.microsoft.codepush.react"

    compileSdkVersion rootProject.hasProperty('compileSdkVersion') ? rootProject.compileSdkVersion : DEFAULT_COMPILE_SDK_VERSION
    buildToolsVersion rootProject.hasProperty('buildToolsVersion') ? rootProject.buildToolsVersion : DEFAULT_BUILD_TOOLS_VERSION

    defaultConfig {
        minSdkVersion rootProject.hasProperty('minSdkVersion') ? rootProject.minSdkVersion : DEFAULT_MIN_SDK_VERSION
        targetSdkVersion rootProject.hasProperty('targetSdkVersion') ? rootProject.targetSdkVersion : DEFAULT_TARGET_SDK_VERSION
        versionCode 1
        versionName "1.0"
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", IS_NEW_ARCHITECTURE_ENABLED.toString()
        consumerProguardFiles 'proguard-rules.pro'
    }

    // AGP 8.x no longer enables BuildConfig generation by default.
    buildFeatures {
        buildConfig = true
    }

    // React Native 0.85 requires Java 17.
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lintOptions {
        abortOnError false
    }
}

dependencies {
    // The `react-android` artifact contains the React Native Android sources
    // and is the recommended dependency from React Native 0.71+.
    implementation "com.facebook.react:react-android"
    implementation 'com.nimbusds:nimbus-jose-jwt:9.37.3'
}
